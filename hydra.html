<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#e8f4fd" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#0d1117" media="(prefers-color-scheme: dark)" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Hydra" />
<title>Hydra — Water Tracker</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #eef6fc;
    --surface: rgba(255,255,255,0.72);
    --surface-solid: #ffffff;
    --border: rgba(160,200,230,0.35);
    --text-primary: #0d2235;
    --text-secondary: #4a6a82;
    --text-tertiary: #8aadc4;
    --accent: #2196f3;
    --accent-light: rgba(33,150,243,0.12);
    --accent-ring: rgba(33,150,243,0.25);
    --water: #38b6f8;
    --water-dark: #1888d4;
    --water-glow: rgba(56,182,248,0.3);
    --danger: #f06060;
    --success: #34c47c;
    --radius: 28px;
    --radius-sm: 16px;
    --shadow: 0 8px 32px rgba(30,90,150,0.10), 0 1.5px 4px rgba(30,90,150,0.06);
    --shadow-btn: 0 4px 20px rgba(33,150,243,0.28);
    --font: 'Geist', system-ui, sans-serif;
    --font-mono: 'Geist Mono', monospace;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0d1117;
      --surface: rgba(22,32,44,0.82);
      --surface-solid: #16202c;
      --border: rgba(56,120,180,0.22);
      --text-primary: #e4f0f8;
      --text-secondary: #7aadc8;
      --text-tertiary: #3a6080;
      --accent: #38b6f8;
      --accent-light: rgba(56,182,248,0.10);
      --accent-ring: rgba(56,182,248,0.22);
      --water: #38b6f8;
      --water-dark: #1888d4;
      --water-glow: rgba(56,182,248,0.22);
      --shadow: 0 8px 32px rgba(0,0,0,0.36), 0 1.5px 4px rgba(0,0,0,0.18);
      --shadow-btn: 0 4px 20px rgba(56,182,248,0.22);
    }
  }

  html { height: 100%; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100%;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
    overflow-x: hidden;
    position: relative;
  }

  /* Ambient background blobs */
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
  }
  body::before {
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(56,182,248,0.18) 0%, transparent 70%);
    top: -120px; left: 50%;
    transform: translateX(-50%);
  }
  body::after {
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(33,150,243,0.10) 0%, transparent 70%);
    bottom: 0; right: -80px;
  }

  .app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    padding: 0 20px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    min-height: 100dvh;
  }

  /* ─── Header ─── */
  .header {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 56px;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo-icon {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, var(--water), var(--water-dark));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px var(--water-glow);
  }
  .logo-icon svg { width: 16px; height: 16px; fill: white; }
  .logo-text {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.4px;
    color: var(--text-primary);
  }
  .logo-text span { color: var(--water); }

  .date-badge {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    background: var(--surface);
    border: 1px solid var(--border);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 6px 12px;
    border-radius: 100px;
    letter-spacing: 0.2px;
  }

  /* ─── Progress Ring ─── */
  .ring-container {
    position: relative;
    width: 260px; height: 260px;
    flex-shrink: 0;
    margin: 8px 0;
  }

  .ring-bg {
    width: 260px; height: 260px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50%;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: var(--shadow);
    position: absolute;
    inset: 0;
  }

  .ring-svg {
    position: absolute;
    inset: 0;
    width: 260px; height: 260px;
    transform: rotate(-90deg);
  }
  .ring-track {
    fill: none;
    stroke: var(--accent-light);
    stroke-width: 10;
  }
  .ring-progress {
    fill: none;
    stroke: url(#waterGradient);
    stroke-width: 10;
    stroke-linecap: round;
    stroke-dasharray: 722;
    stroke-dashoffset: 722;
    transition: stroke-dashoffset 0.8s cubic-bezier(0.34, 1.26, 0.64, 1);
    filter: drop-shadow(0 0 6px var(--water-glow));
  }

  .ring-inner {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
  }

  .ring-amount {
    font-size: 42px;
    font-weight: 600;
    letter-spacing: -1.5px;
    color: var(--text-primary);
    line-height: 1;
    font-variant-numeric: tabular-nums;
    transition: all 0.3s ease;
  }
  .ring-amount.bump {
    animation: bump 0.35s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes bump {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); color: var(--water); }
    100% { transform: scale(1); }
  }

  .ring-unit {
    font-size: 14px;
    font-weight: 400;
    color: var(--text-tertiary);
    letter-spacing: 0.2px;
    margin-top: 2px;
  }

  .ring-goal-text {
    font-size: 12px;
    font-family: var(--font-mono);
    color: var(--text-secondary);
    margin-top: 8px;
    letter-spacing: 0.5px;
  }

  /* Water ripple decoration */
  .ring-drop {
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    width: 6px; height: 8px;
    background: var(--water);
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    opacity: 0.7;
    animation: drip 3s ease-in-out infinite;
  }
  @keyframes drip {
    0%, 100% { opacity: 0.7; transform: translateX(-50%) translateY(0); }
    50% { opacity: 1; transform: translateX(-50%) translateY(2px); }
  }

  /* ─── Motivational text ─── */
  .motivation {
    font-size: 14px;
    color: var(--text-secondary);
    font-weight: 400;
    letter-spacing: 0.1px;
    text-align: center;
    min-height: 20px;
    transition: opacity 0.3s ease;
  }
  .motivation .highlight { color: var(--water); font-weight: 500; }

  /* ─── Stats row ─── */
  .stats {
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1px 1fr 1px 1fr;
    gap: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .stat-divider {
    background: var(--border);
    align-self: stretch;
  }
  .stat {
    padding: 16px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .stat-label {
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-tertiary);
  }
  .stat-value {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.3px;
    font-variant-numeric: tabular-nums;
  }
  .stat-value.accent { color: var(--water); }

  /* ─── Main action button ─── */
  .add-btn {
    width: 100%;
    height: 64px;
    background: linear-gradient(135deg, var(--water) 0%, var(--water-dark) 100%);
    border: none;
    border-radius: var(--radius-sm);
    color: white;
    font-family: var(--font);
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.2px;
    cursor: pointer;
    box-shadow: var(--shadow-btn);
    transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.15s ease, opacity 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    position: relative;
    overflow: hidden;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .add-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.12);
    border-radius: inherit;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .add-btn:hover::before { opacity: 1; }
  .add-btn:active {
    transform: scale(0.96);
    box-shadow: 0 2px 8px var(--water-glow);
  }
  .add-btn.pressed {
    animation: press 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes press {
    0% { transform: scale(1); }
    40% { transform: scale(0.94); }
    100% { transform: scale(1); }
  }

  .add-btn svg { width: 22px; height: 22px; flex-shrink: 0; }

  /* Ripple effect on button */
  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.35);
    transform: scale(0);
    animation: rippleAnim 0.55s linear;
    pointer-events: none;
  }
  @keyframes rippleAnim {
    to { transform: scale(4); opacity: 0; }
  }

  /* ─── Quick-add options ─── */
  .quick-add {
    width: 100%;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .quick-btn {
    height: 46px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-secondary);
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s cubic-bezier(0.34,1.56,0.64,1);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    letter-spacing: -0.1px;
  }
  .quick-btn:hover {
    background: var(--accent-light);
    border-color: var(--accent-ring);
    color: var(--water);
  }
  .quick-btn:active { transform: scale(0.94); }

  /* ─── Custom input ─── */
  .custom-water-wrap {
    display: flex;
    gap: 6px;
    height: 46px;
  }
  .custom-input {
    width: 100%;
    min-width: 0;
    height: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-primary);
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    text-align: center;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    transition: all 0.15s;
    outline: none;
  }
  .custom-input::placeholder { color: var(--text-secondary); letter-spacing: -0.1px; }
  .custom-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-ring); }
  
  .custom-input::-webkit-outer-spin-button,
  .custom-input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    appearance: none;
    margin: 0;
  }
  .custom-input[type=number] {
    -moz-appearance: textfield;
    appearance: textfield;
  }

  /* ─── Log section ─── */
  .log-section {
    width: 100%;
  }
  .log-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .log-title {
    font-size: 12px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-tertiary);
  }
  .reset-btn {
    font-size: 11px;
    color: var(--text-tertiary);
    background: none;
    border: none;
    cursor: pointer;
    font-family: var(--font);
    padding: 4px 8px;
    border-radius: 6px;
    transition: all 0.15s;
    letter-spacing: 0.2px;
  }
  .reset-btn:hover { color: var(--danger); background: rgba(240,96,96,0.08); }

  .log-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 200px;
    overflow-y: auto;
    scrollbar-width: none;
  }
  .log-list::-webkit-scrollbar { display: none; }

  .log-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    animation: slideIn 0.35s cubic-bezier(0.34,1.26,0.64,1);
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .log-item-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .log-dot {
    width: 8px; height: 8px;
    background: var(--water);
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 6px var(--water-glow);
  }
  .log-ml {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
  }
  .log-time {
    font-size: 11px;
    color: var(--text-tertiary);
    font-family: var(--font-mono);
  }

  .log-empty {
    text-align: center;
    padding: 24px;
    color: var(--text-tertiary);
    font-size: 13px;
  }

  /* ─── Goal editor ─── */
  .goal-row {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  .goal-label {
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 400;
  }
  .goal-controls {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .goal-adj {
    width: 30px; height: 30px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface-solid);
    color: var(--text-primary);
    font-size: 18px;
    font-family: var(--font);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    line-height: 1;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .goal-adj:hover { background: var(--accent-light); border-color: var(--accent-ring); color: var(--water); }
  .goal-adj:active { transform: scale(0.88); }
  .goal-value {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
    min-width: 44px;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }

  /* ─── Toast ─── */
  .toast {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text-primary);
    color: var(--bg);
    font-size: 13px;
    font-weight: 500;
    padding: 10px 20px;
    border-radius: 100px;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s cubic-bezier(0.34,1.26,0.64,1);
    white-space: nowrap;
    z-index: 100;
    letter-spacing: -0.1px;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ─── Celebration animation ─── */
  .confetti-wrap {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 99;
    overflow: hidden;
  }
  .conf-piece {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 2px;
    animation: confFall linear forwards;
  }
  @keyframes confFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    80% { opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>

<div class="app">

  <!-- Header -->
  <header class="header">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C12 2 5 10 5 15a7 7 0 0014 0C19 10 12 2 12 2z"/>
        </svg>
      </div>
      <span class="logo-text">hydr<span>a</span></span>
    </div>
    <div style="display:flex; gap:10px; align-items:center;">
      <div class="date-badge" id="dateBadge"></div>
      <button id="authBtn" class="reset-btn" style="background:var(--surface); border:1px solid var(--border); padding:6px 12px; font-weight:500;">Login</button>
    </div>
  </header>

  <!-- Progress Ring -->
  <div class="ring-container">
    <div class="ring-bg"></div>
    <div class="ring-drop"></div>
    <svg class="ring-svg" viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="waterGradient" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#38b6f8"/>
          <stop offset="100%" style="stop-color:#1888d4"/>
        </linearGradient>
      </defs>
      <circle class="ring-track" cx="130" cy="130" r="115"/>
      <circle class="ring-progress" id="ringProgress" cx="130" cy="130" r="115"/>
    </svg>
    <div class="ring-inner">
      <div class="ring-amount" id="ringAmount">0.0</div>
      <div class="ring-unit">litres today</div>
      <div class="ring-goal-text" id="ringGoalText">of 2.5 L goal</div>
    </div>
  </div>

  <!-- Motivational text -->
  <div class="motivation" id="motivation">Start your day with a glass of water 💧</div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <span class="stat-label">Drunk</span>
      <span class="stat-value accent" id="statDrunk">0 ml</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <span class="stat-label">Remaining</span>
      <span class="stat-value" id="statRemaining">2500 ml</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <span class="stat-label">Streak</span>
      <span class="stat-value accent" id="statStreak">0 🔥</span>
    </div>
  </div>

  <!-- Main Button -->
  <button class="add-btn" id="addBtn" onclick="addWater(250)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 5v14M5 12h14"/>
    </svg>
    + 250 ml
  </button>

  <!-- Quick add -->
  <div class="quick-add">
    <button class="quick-btn" onclick="addWater(150)">+ 150 ml</button>
    <button class="quick-btn" onclick="addWater(500)">+ 500 ml</button>
    <div class="custom-water-wrap" id="customWaterWrap">
      <input type="number" id="customWaterInput" class="custom-input" placeholder="Custom" onkeypress="if(event.key==='Enter') addCustomWater()">
      <button class="quick-btn" style="flex-shrink:0; padding:0 12px; color:var(--water); border-color:var(--accent-ring); background:var(--accent-light);" onclick="addCustomWater()">+</button>
    </div>
  </div>

  <!-- Goal editor -->
  <div class="goal-row">
    <span class="goal-label">Daily Goal</span>
    <div class="goal-controls">
      <button class="goal-adj" onclick="adjustGoal(-250)">−</button>
      <span class="goal-value" id="goalDisplay">2.5 L</span>
      <button class="goal-adj" onclick="adjustGoal(250)">+</button>
    </div>
  </div>

  <!-- Log -->
  <div class="log-section">
    <div class="log-header">
      <span class="log-title">Today's log</span>
      <button class="reset-btn" onclick="resetDay()">Reset day</button>
    </div>
    <div class="log-list" id="logList">
      <div class="log-empty" id="logEmpty">No water logged yet. Go drink some! 💧</div>
    </div>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Confetti wrapper -->
<div class="confetti-wrap" id="confettiWrap"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBhfX6H8QIt_E6dFkVHeXwqr7Z6rf-mCls",
  authDomain: "watermeterpro.firebaseapp.com",
  projectId: "watermeterpro",
  storageBucket: "watermeterpro.firebasestorage.app",
  messagingSenderId: "60708408734",
  appId: "1:60708408734:web:d0ffcb5797b1e7d5a31a8f",
  measurementId: "G-E3XJLD2142"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// Auth state
let currentUser = null;
let unsubFirestore = null;

const CIRCUMFERENCE = 2 * Math.PI * 115;
const CONF_COLORS = ['#38b6f8','#1888d4','#34c47c','#fbbf24','#f472b6','#a78bfa'];

let state = loadLocalState();

function loadLocalState() {
  const today = todayStr();
  const raw = localStorage.getItem('hydra_data');
  if (raw) {
    const d = JSON.parse(raw);
    if (d.date === today) return d;
    return { date: today, intake: 0, goal: d.goal || 2500, log: [], streak: calcStreak(d), customQuickAdd: d.customQuickAdd || null, userName: d.userName || null };
  }
  return { date: today, intake: 0, goal: 2500, log: [], streak: 0, customQuickAdd: null, userName: null };
}

function todayStr(d = new Date()) {
  const year = d.getFullYear();
  const month = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${year}-${month}-${day}`;
}

function calcStreak(prev) {
  if (!prev) return 0;
  const y = new Date(Date.now() - 86400000);
  const yesterday = todayStr(y);
  if (prev.date === yesterday && prev.intake >= prev.goal) {
    return (prev.streak || 0) + 1;
  }
  return 0;
}

function saveState() {
  if (currentUser && currentUser.displayName) {
    state.userName = currentUser.displayName;
  }
  localStorage.setItem('hydra_data', JSON.stringify(state));
  if (currentUser) {
    setDoc(doc(db, "users", currentUser.uid), state).catch(e => console.error("Error saving to Firestore:", e));
  }
}

function addWater(ml) {
  const btn = document.getElementById('addBtn');
  btn.classList.remove('pressed');
  void btn.offsetWidth;
  btn.classList.add('pressed');

  // ripple
  const b = btn.getBoundingClientRect();
  const rip = document.createElement('span');
  rip.className = 'ripple';
  const size = Math.max(b.width, b.height);
  rip.style.cssText = `width:${size}px;height:${size}px;left:${(b.width-size)/2}px;top:${(b.height-size)/2}px`;
  btn.appendChild(rip);
  setTimeout(() => rip.remove(), 600);

  state.intake += ml;
  const now = new Date();
  state.log.unshift({ ml, time: now.toTimeString().slice(0,5) });

  if (state.log.length > 20) state.log.pop();

  checkMidnight();
  saveState();
  render();

  if (state.intake >= state.goal && state.intake - ml < state.goal) {
    celebrate();
    showToast('Goal reached! Amazing work 🎉');
  } else {
    showToast(`+${ml} ml added`);
  }
}

function addCustomWater() {
  const input = document.getElementById('customWaterInput');
  if (!input) return;
  const val = parseInt(input.value, 10);
  if (!isNaN(val) && val > 0) {
    state.customQuickAdd = val;
    addWater(val);
  }
}

function clearCustomQuickAdd() {
  state.customQuickAdd = null;
  saveState();
  render();
}

function adjustGoal(delta) {
  const newGoal = Math.max(500, Math.min(5000, state.goal + delta));
  state.goal = newGoal;
  saveState();
  render();
}

function resetDay() {
  state.intake = 0;
  state.log = [];
  saveState();
  render();
  showToast('Day reset');
}

function checkMidnight() {
  const today = todayStr();
  if (state.date !== today) {
    const prevStreak = state.intake >= state.goal ? (state.streak || 0) + 1 : 0;
    state = { date: today, intake: 0, goal: state.goal, log: [], streak: prevStreak, customQuickAdd: state.customQuickAdd };
  }
}

function render() {
  checkMidnight();
  const { intake, goal, log, streak } = state;
  const pct = Math.min(1, intake / goal);
  const offset = CIRCUMFERENCE * (1 - pct);

  // Ring
  document.getElementById('ringProgress').style.strokeDashoffset = offset;
  const litres = (intake / 1000).toFixed(1);
  const el = document.getElementById('ringAmount');
  el.textContent = litres;
  el.classList.remove('bump');
  void el.offsetWidth;
  el.classList.add('bump');

  document.getElementById('ringGoalText').textContent = `of ${(goal/1000).toFixed(1)} L goal`;
  document.getElementById('goalDisplay').textContent = `${(goal/1000).toFixed(1)} L`;

  // Stats
  document.getElementById('statDrunk').textContent = intake >= 1000 ? `${(intake/1000).toFixed(1)} L` : `${intake} ml`;
  const remaining = Math.max(0, goal - intake);
  document.getElementById('statRemaining').textContent = remaining >= 1000 ? `${(remaining/1000).toFixed(1)} L` : `${remaining} ml`;
  document.getElementById('statStreak').textContent = streak > 0 ? `${streak} 🔥` : '—';

  // Motivation
  const motivations = [
    { min: 0, max: 0, msg: 'Start your day with a glass of water 💧' },
    { min: 1, max: 500, msg: 'Good start! <span class="highlight">Keep it up →</span>' },
    { min: 501, max: 1000, msg: 'You\'re building momentum 💪' },
    { min: 1001, max: 1500, msg: 'Halfway there! <span class="highlight">Keep going 💧</span>' },
    { min: 1501, max: 2000, msg: 'Almost there — <span class="highlight">you\'ve got this!</span>' },
    { min: 2001, max: 2499, msg: 'So close! Just a bit more 🎯' },
    { min: 2500, max: Infinity, msg: '<span class="highlight">Goal crushed!</span> You\'re glowing 🌊' },
  ];
  const m = motivations.find(m => intake >= m.min && intake <= m.max) || motivations[motivations.length-1];
  document.getElementById('motivation').innerHTML = m.msg;

  // Log list
  const logList = document.getElementById('logList');
  let html = '<div class="log-empty" id="logEmpty" ' + (log.length === 0 ? '' : 'style="display:none"') + '>No water logged yet. Go drink some! 💧</div>';
  
  if (log.length > 0) {
    log.forEach(entry => {
      html += `
        <div class="log-item">
          <div class="log-item-left">
            <div class="log-dot"></div>
            <span class="log-ml">+${entry.ml} ml</span>
          </div>
          <span class="log-time">${entry.time}</span>
        </div>
      `;
    });
  }
  logList.innerHTML = html;

  // Custom button
  const customWrap = document.getElementById('customWaterWrap');
  if (customWrap) {
    if (state.customQuickAdd) {
      customWrap.innerHTML = `
        <button class="quick-btn" style="flex:1;" onclick="addWater(${state.customQuickAdd})">+ ${state.customQuickAdd} ml</button>
        <button class="quick-btn" style="width:36px; flex-shrink:0; color:var(--text-tertiary); font-size:14px; padding:0;" onclick="clearCustomQuickAdd()">✕</button>
      `;
    } else {
      customWrap.innerHTML = `
        <input type="number" id="customWaterInput" class="custom-input" placeholder="Custom" onkeypress="if(event.key==='Enter') addCustomWater()">
        <button class="quick-btn" style="flex-shrink:0; padding:0 12px; color:var(--water); border-color:var(--accent-ring); background:var(--accent-light);" onclick="addCustomWater()">+</button>
      `;
    }
  }

  // Date badge
  const now = new Date();
  const opts = { weekday: 'short', month: 'short', day: 'numeric' };
  document.getElementById('dateBadge').textContent = now.toLocaleDateString('en-US', opts);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2000);
}

function celebrate() {
  const wrap = document.getElementById('confettiWrap');
  wrap.innerHTML = '';
  for (let i = 0; i < 40; i++) {
    const c = document.createElement('div');
    c.className = 'conf-piece';
    c.style.cssText = `
      left:${Math.random()*100}%;
      top:-10px;
      background:${CONF_COLORS[Math.floor(Math.random()*CONF_COLORS.length)]};
      animation-duration:${0.8+Math.random()*1.4}s;
      animation-delay:${Math.random()*0.3}s;
      transform-origin: center;
      border-radius:${Math.random()>0.5?'50%':'2px'};
    `;
    wrap.appendChild(c);
  }
  setTimeout(() => { wrap.innerHTML = ''; }, 2500);
}

// Auto-reset at midnight
function scheduleMidnightReset() {
  const now = new Date();
  const msUntilMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate()+1) - now;
  setTimeout(() => {
    checkMidnight();
    render();
    scheduleMidnightReset();
  }, msUntilMidnight);
}

// Expose core functions to window for onclick handlers
window.addWater = addWater;
window.addCustomWater = addCustomWater;
window.clearCustomQuickAdd = clearCustomQuickAdd;
window.adjustGoal = adjustGoal;
window.resetDay = resetDay;

// Auth UI logic
const authBtn = document.getElementById('authBtn');
authBtn.addEventListener('click', () => {
  if (currentUser) {
    signOut(auth);
  } else {
    signInWithPopup(auth, new GoogleAuthProvider());
  }
});

onAuthStateChanged(auth, (user) => {
  if (user) {
    currentUser = user;
    if (user.displayName) state.userName = user.displayName;
    if (user.photoURL) {
      authBtn.innerHTML = `<img src="${user.photoURL}" style="width:26px; height:26px; border-radius:50%; object-fit:cover; display:block;" title="Logout" />`;
      authBtn.style.padding = '2px';
    } else {
      authBtn.textContent = 'Logout';
      authBtn.style.padding = '6px 12px';
    }
    if (unsubFirestore) unsubFirestore();
    unsubFirestore = onSnapshot(doc(db, "users", user.uid), (docSnap) => {
      if (docSnap.exists()) {
        const remoteState = docSnap.data();
        // Ensure name is preserved if available from auth
        if (user.displayName) remoteState.userName = user.displayName;
        
        if (remoteState.date === todayStr()) {
          state = remoteState;
        } else {
          state = remoteState;
          checkMidnight();
        }
        localStorage.setItem('hydra_data', JSON.stringify(state));
        // If the remote state didn't have the user name, update it now
        if (user.displayName && !docSnap.data().userName) {
           saveState();
        }
      } else {
        saveState();
      }
      render();
    }, (error) => {
      console.error("Firestore listener error:", error);
    });
  } else {
    currentUser = null;
    authBtn.textContent = 'Login';
    authBtn.style.padding = '6px 12px';
    if (unsubFirestore) {
      unsubFirestore();
      unsubFirestore = null;
    }
    state = loadLocalState();
    render();
  }
});

render();
scheduleMidnightReset();

// SW registration for PWA
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    const sw = `
self.addEventListener('install', e => self.skipWaiting());
self.addEventListener('activate', e => clients.claim());
self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => new Response(''))));
    `;
    const blob = new Blob([sw], { type: 'application/javascript' });
    navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
  });
}
</script>
